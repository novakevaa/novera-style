const itemSeeds={Jacket:[['MANGO','Linen Blend Blazer',119,'jacket'],['Massimo Dutti','Tailored Wool Blazer',189,'jacket'],['COS','Sculpted Jacket',165,'jacket']],Top:[['& Other Stories','Satin Cowl Top',79,'top'],['Reformation','Silk Camisole',98,'top'],['Aritzia','Contour Bodysuit',68,'top']],Dress:[['Reformation','Veda Silk Dress',148,'dress'],['Rat & Boa','Lucille Midi Dress',235,'dress'],['Mango','Asymmetric Satin Dress',129,'dress']],Bottom:[['COS','Fluid Wide-Leg Trousers',110,'bottom'],['Aritzia','Effortless Pant',148,'bottom'],['Zara','High-Waist Satin Skirt',69,'bottom']],Shoes:[['Steve Madden','Irenee Heeled Sandal',79,'shoe'],['Alohas','Sculpted Leather Mule',175,'shoe'],['Vagabond','Jolin Slingback',150,'shoe']],Bag:[['JW PEI','Abacus Ruched Bag',89,'bag'],['Polène','Numéro Neuf Mini',490,'bag'],['Charles & Keith','Padded Chain Bag',105,'bag']],Jewelry:[['Ana Luisa','Twist Hoops',39,'jewelry'],['Mejuri','Dôme Hoops',78,'jewelry'],['Missoma','Molten Necklace',126,'jewelry']]};
function makeLook(id='look-'+Date.now(),title='Soft Autumn Date Night',v=0){const cats=state.occasion==='Work'?['Jacket','Top','Bottom','Shoes','Bag','Jewelry']:['Jacket','Dress','Shoes','Bag','Jewelry'];const items=cats.map((cat,i)=>{const a=itemSeeds[cat][(v+i)%itemSeeds[cat].length];return{id:`${id}-${cat.toLowerCase()}`,category:cat,brand:a[0],name:a[1],price:a[2],image:fashionSVG(a[3],cat,v+i),store:['MANGO','Reformation','Nordstrom','Mytheresa','NET-A-PORTER'][i%5]}});return{id,title,description:'A polished romantic look curated for your evening.',occasion:state.occasion||'Date',vibes:[...(state.vibe||['Elegant'])],createdAt:Date.now(),liked:false,items,total:items.reduce((a,b)=>a+b.price,0),hero:items[1]?.image||items[0].image}}
function sampleLooks(){return[makeLook('city-chic','City Chic Tailoring',0),makeLook('soft-romance','Soft Romance',3),makeLook('minimal-luxe','Minimal Luxury',2),makeLook('quiet-luxe','Quiet Luxury',4),makeLook('weekend-glow','Weekend Glow',1),makeLook('gallery-night','Gallery Night',2)]}
function getCatalog(){const x=sampleLooks();return x.map((l,i)=>({...l,liked:state.likedIds.includes(l.id),description:['Refined neutrals for city days.','Silky shapes with a feminine finish.','Clean lines, warm texture, effortless polish.','A capsule of timeless investment pieces.','Relaxed tailoring with a soft glow.','Artful layers for an evening out.'][i]}))}
function logoMark(){return`<div class="brand-mark"><span class="brand-star top">✦</span><span class="brand-ring"></span><span class="brand-n">N</span><span class="brand-star bottom">✦</span></div>`}
function topbar(opts={}){return`<div class="topbar">${opts.back?`<button class="icon-btn" data-action="back" aria-label="${t('back')}">${icon('back')}</button>`:'<span class="icon-btn" aria-hidden="true"></span>'}${opts.center||''}${opts.right||'<span class="icon-btn" aria-hidden="true"></span>'}</div>`}
function bottomNav(active='home'){const x=[['home','home'],['discover','discover'],['looks','looks'],['closet','closet'],['profile','user']];return`<nav class="bottom-nav" aria-label="Main navigation">${x.map(([s,i])=>`<button class="nav-item ${active===s?'active':''}" data-nav="${s}" aria-label="${t(s)}">${icon(i,22)}<span>${t(s)}</span></button>`).join('')}</nav>`}
function shell(content,nav=''){return`<div class="app-shell"><div class="luxury-bg"><div class="spark-field"></div></div>${content}${nav?bottomNav(nav):''}</div>`}
function lookCard(l,opts={}){const liked=l.liked||state.likedIds.includes(l.id)||state.savedLooks.some(x=>x.id===l.id);return`<article class="look-card" data-open-look="${esc(l.id)}"><div class="image-wrap"><img src="${l.hero||l.items?.[0]?.image||fashionSVG('dress','LOOK',0)}" alt="${esc(l.title)}"><button class="card-heart" data-like-look="${esc(l.id)}" aria-label="Favorite">${icon('heart',22,liked)}</button>${opts.delete?`<button class="card-delete" data-delete-look="${esc(l.id)}" aria-label="${t('remove')}">${icon('trash',20)}</button>`:''}</div><div class="card-body"><h3>${esc(l.title)}</h3><p>${esc(l.description||translated(l.vibes?.[0]||'Elegant'))}</p></div></article>`}
function sectionRow(title,action,screen){return`<div class="section-title-row"><h2 class="section-title">${title}</h2>${action?`<button class="section-action" data-nav="${screen}">${action}</button>`:''}</div>`}
function occasionTiles(limit=false){const arr=[['Date night','heart'],['Party','sparkles'],['Birthday','calendar'],['Dinner','dress'],['Concert','sparkles'],['Wedding','jewelry'],['Vacation','cloud'],['Everyday','closet']];return`<div class="occasion-grid">${arr.slice(0,limit?8:arr.length).map(([x,i])=>`<button class="occasion-tile" data-occasion="${x==='Date night'?'Date':x}">${icon(i,25)}<span>${t({Date:'dateNight',Party:'party',Birthday:'birthday',Dinner:'dinner',Concert:'concert',Wedding:'wedding',Vacation:'vacation',Everyday:'everyday'}[x==='Date night'?'Date':x]||x.toLowerCase())}</span></button>`).join('')}</div>`}
function renderSplash(){return shell(`<main class="screen"><div class="logo-stage">${logoMark()}<h1 class="brand-name">NOVERA</h1><p class="brand-tagline">${t('personalStylist')}</p><div class="splash-actions button-stack"><button class="btn btn-primary" data-action="start">${t('getStarted')}</button><button class="btn btn-secondary" data-action="signin">${t('signIn')}</button></div></div></main>`)}
function renderLanguage(){return shell(`<main class="screen">${topbar({back:true,right:`<button class="text-btn" data-action="skip-language">${t('skip')}</button>`})}<h1 class="title">${t('chooseLanguage')}</h1><p class="subtitle">${t('languageSubtitle')}</p><div class="search-field"><span class="search-icon">${icon('search')}</span><input class="field" id="languageSearch" placeholder="${t('searchLanguages')}" autocomplete="off"></div><div id="languageList" class="language-list"></div><div class="sticky-action"><button class="btn btn-primary" data-action="language-next">${t('continue')}</button></div></main>`)}
function renderLanguageList(q=''){const target=document.getElementById('languageList');if(!target)return;const query=q.trim().toLowerCase();let all=langs.filter(x=>!query||x[0].includes(query)||x[1].toLowerCase().includes(query));all.sort((a,b)=>(pinned.has(a[0])===pinned.has(b[0])?0:pinned.has(a[0])?-1:1));target.innerHTML=all.map((x,i)=>`${i===0||pinned.has(x[0])!==pinned.has(all[i-1]?.[0])?`<div class="pinned-label">${pinned.has(x[0])?'Featured':'All languages'}</div>`:''}<button class="language-row ${state.language===x[0]?'selected':''}" data-language="${x[0]}"><span class="language-code">${x[0].toUpperCase().slice(0,2)}</span><span>${esc(x[1])}</span>${state.language===x[0]?`<span class="check">${icon('check',17)}</span>`:''}</button>`).join('')||`<div class="empty-state"><p>${t('noResults')}</p></div>`}
function renderAppearance(){return shell(`<main class="screen">${topbar({back:true})}<h1 class="title">${t('chooseAppearance')}</h1><p class="subtitle">${t('appearanceSubtitle')}</p><div class="appearance-grid">${[['light','lightDescription'],['dark','darkDescription']].map(([v,d])=>`<button class="appearance-card ${state.theme===v?'selected':''}" data-theme-choice="${v}"><div class="appearance-preview ${v}"></div><strong>${t(v)}</strong><p>${t(d)}</p>${state.theme===v?`<span class="select-badge">${icon('check',18)}</span>`:''}</button>`).join('')}</div><div class="sticky-action"><button class="btn btn-primary" data-action="appearance-next">${t('continue')}</button></div></main>`)}
function renderAccount(){const sign=state.authMode==='signin';return shell(`<main class="screen">${topbar({back:true})}<h1 class="title">${sign?t('signIn'):t('createAccount')}</h1><p class="subtitle">${sign?t('welcomeBack'):'Join NOVERA and save every look you love.'}</p>${!sign?fieldHTML('name',t('firstName'),'text',state.name):''}${fieldHTML('email',t('email'),'email',state.email)}${fieldHTML('password',t('password'),'password','')}<div class="button-stack"><button class="btn btn-primary" data-action="submit-account">${sign?t('signIn'):t('createAccountButton')}</button><button class="btn btn-secondary" data-action="apple">${icon('user',19)} ${t('continueApple')}</button><button class="btn btn-ghost" data-action="toggle-auth">${sign?t('createAccount'):t('alreadyAccount')}</button></div></main>`)}

function renderScreen(){clearInterval(timer);timer=null;setTheme(state.theme,false);setLanguage(state.language,false);const map={splash:renderSplash,language:renderLanguage,appearance:renderAppearance,account:renderAccount,setup:renderSetup,home:renderHome,occasion:renderOccasion,vibe:renderVibe,inspiration:renderInspiration,styling:renderStyling,result:renderResult,discover:renderDiscover,looks:renderLooks,closet:renderCloset,profile:renderProfile};const fn=map[state.screen]||renderHome;app.innerHTML=fn();bindScreen();requestAnimationFrame(()=>window.scrollTo(0,0));if(state.screen==='language')renderLanguageList();if(state.screen==='styling')startProgress()}

function openSheet(title,body,footer=''){closeSheet();const o=document.createElement('div');o.className='sheet-overlay';o.id='sheetOverlay';o.innerHTML=`<section class="sheet" role="dialog" aria-modal="true" aria-label="${esc(title)}"><div class="sheet-handle"></div><header class="sheet-header"><h2>${esc(title)}</h2><button class="icon-btn" data-close-sheet aria-label="${t('close')}">${icon('close')}</button></header><div class="sheet-scroll">${body}</div>${footer?`<div class="sheet-footer">${footer}</div>`:''}</section>`;document.body.appendChild(o);sheet=o;o.addEventListener('click',e=>{if(e.target===o||e.target.closest('[data-close-sheet]'))closeSheet()})}

function openOptionsSheet({title,options,value,multi=false,max=99,search=false,custom=false,onApply}){let selected=new Set((multi?(Array.isArray(value)?value:[]):[value]).filter(Boolean));const makeRows=q=>options.filter(x=>!q||String(x.label||x.value||x).toLowerCase().includes(q.toLowerCase())).map(x=>{const v=typeof x==='string'?x:x.value,l=typeof x==='string'?x:(x.label||x.value),d=typeof x==='string'?'':x.description;return`<button class="sheet-option ${selected.has(v)?'selected':''}" data-sheet-value="${esc(v)}"><span class="round-icon">${icon('sparkles',19)}</span><span class="option-copy"><strong>${esc(translated(l))}</strong>${d?`<small>${esc(d)}</small>`:''}</span>${selected.has(v)?icon('check',20):''}</button>`}).join('');const searchHTML=search?`<div class="search-field"><span class="search-icon">${icon('search')}</span><input class="field" id="sheetSearch" placeholder="${t('search')}" autocomplete="off"></div>`:'';const customHTML=custom?`<button class="sheet-option" data-sheet-custom><span class="round-icon">${icon('plus')}</span><span class="option-copy"><strong>${t('enterCustom')}</strong></span>${icon('chevron')}</button>`:'';openSheet(title,`${searchHTML}<div id="sheetOptions">${makeRows('')}</div>${customHTML}`,multi?`<button class="btn btn-primary" id="sheetApply">${t('done')}</button>`:'');const root=document.getElementById('sheetOverlay');const rows=()=>root.querySelector('#sheetOptions');root.addEventListener('click',e=>{const b=e.target.closest('[data-sheet-value]');if(b){const v=b.dataset.sheetValue;if(multi){if(selected.has(v))selected.delete(v);else if(selected.size<max)selected.add(v);else return showToast(`${t('chooseUpTo')} ${max}`);rows().innerHTML=makeRows(root.querySelector('#sheetSearch')?.value||'')}else{closeSheet();onApply(v)}}const c=e.target.closest('[data-sheet-custom]');if(c){openTextSheet(title,'',x=>onApply(x),true)}if(e.target.closest('#sheetApply')){closeSheet();onApply([...selected])}});root.querySelector('#sheetSearch')? function openTextSheet(title,value,onApply,required=false,placeholder=''){openSheet(title,`<div class="field-wrap"><input class="field" id="sheetText" value="${esc(value)}" placeholder="${esc(placeholder||title)}" maxlength="120"><div class="field-error" id="sheetTextError"></div></div>`,`<button class="btn btn-primary" id="sheetTextSave">${t('save')}</button>`);const root=document.getElementById('sheetOverlay'),input=root.querySelector('#sheetText');setTimeout(()=>input.focus(),200);root.querySelector('#sheetTextSave').onclick=()=>{const v=input.value.trim();if(required&&!v){root.querySelector('#sheetTextError').textContent=t('required');return}closeSheet();onApply(v)}}

function validateAccount(){const sign=state.authMode==='signin',name=document.getElementById('name'),email=document.getElementById('email'),pass=document.getElementById('password');let ok=true;const err=(id,m)=>{const x=document.getElementById(id+'Error');if(x)x.textContent=m};['name','email','password'].forEach(x=>err(x,''));if(!sign&&(!name||!name.value.trim())){err('name',t('required'));ok=false}if(!email.value.trim()||!/^\S+@\S+\.\S+$/.test(email.value)){err('email',t('validEmail'));ok=false}if(pass.value.length<4){err('password',t('passwordLength'));ok=false}if(ok){if(name)state.name=name.value.trim();state.email=email.value.trim();saveState();navigateTo('setup')}return ok}

function resizeImage(file,cb){if(!file)return;const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{const max=900,scale=Math.min(1,max/Math.max(im.width,im.height)),c=document.createElement('canvas');c.width=Math.max(1,Math.round(im.width*scale));c.height=Math.max(1,Math.round(im.height*scale));c.getContext('2d').drawImage(im,0,0,c.width,c.height);cb({name:file.name,data:c.toDataURL('image/jpeg',.78)})};im.onerror=()=>showToast(t('imageError'));im.src=r.result};r.readAsDataURL(file)}
function startProgress(){let p=0;const f=document.getElementById('progressFill'),n=document.getElementById('progressNumber');timer=setInterval(()=>{p=Math.min(100,p+2+Math.random()*3);if(f)f.style.width=p+'%';if(n)n.textContent=Math.round(p)+'%';if(p>=100){clearInterval(timer);timer=null;setTimeout(()=>{generateLook(true);showToast(t('lookGenerated'))},220)}},90)}
function generateLook(fromProgress=false){if(!fromProgress)return navigateTo('styling');const vibe=state.vibe[0]||'Elegant',season=(state.weather||'Autumn').split(' · ')[0],occ=state.occasion==='Date'?'Date Night':state.occasion;const l=makeLook('generated-'+Date.now(),`${vibe} ${season} ${occ}`,Math.floor(Math.random()*5));l.description=`A polished ${vibe.toLowerCase()} look curated for your ${occ.toLowerCase()}.`;state.currentLook=l;state.recentLooks=[l,...state.recentLooks.filter(x=>x.id!==l.id)].slice(0,12);saveState();state.screen='result';renderScreen()}
function saveLook(){const l=state.currentLook;if(!l)return;const i=state.savedLooks.findIndex(x=>x.id===l.id);if(i<0)state.savedLooks.unshift(JSON.parse(JSON.stringify(l)));else state.savedLooks[i]=JSON.parse(JSON.stringify(l));saveState();showToast(t('lookSaved'));renderScreen()}
function replaceItem(cat){const l=state.currentLook;if(!l)return;const idx=l.items.findIndex(x=>x.category===cat);if(idx<0)return;const list=itemSeeds[cat]||itemSeeds.Dress,old=l.items[idx],cur=list.findIndex(x=>x[1]===old.name),a=list[(cur+1+list.length)%list.length];l.items[idx]={...old,brand:a[0],name:a[1],price:a[2],image:fashionSVG(a[3],cat,Date.now()%5)};l.total=l.items.reduce((s,x)=>s+x.price,0);const ri=state.recentLooks.findIndex(x=>x.id===l.id);if(ri>=0)state.recentLooks[ri]=JSON.parse(JSON.stringify(l));const si=state.savedLooks.findIndex(x=>x.id===l.id);if(si>=0)state.savedLooks[si]=JSON.parse(JSON.stringify(l));saveState();showToast(t('itemReplaced'));renderScreen()}

function openLookById(id){const l=findLook(id);if(l){state.currentLook=JSON.parse(JSON.stringify(l));navigateTo('result',{look:state.currentLook})}}
function toggleLike(id){const i=state.likedIds.indexOf(id);if(i>=0)state.likedIds.splice(i,1);else state.likedIds.push(id);for(const arr of [state.savedLooks,state.recentLooks]){const x=arr.find(y=>y.id===id);if(x)x.liked=i<0}if(state.currentLook?.id===id)state.currentLook.liked=i<0;saveState();renderScreen();showToast(i<0?t('saved'):t('removedFavorite'))}

function openAddItem(){let photo=null;openSheet(t('addItem'),`<label class="upload-card" for="closetFile"><span class="round-icon">${icon('camera')}</span><span class="upload-copy"><h3>${t('uploadPhoto')}</h3><p id="closetPhotoName">${t('chooseImage')}</p></span><span class="upload-add">${icon('plus')}</span></label><input class="sr-only" id="closetFile" type="file" accept="image/*" capture="environment">${sheetField('closetName',t('itemName'))}${sheetField('closetColor',t('color'))}<div class="field-wrap"><label class="field-label">${t('category')}</label><select class="field" id="closetCategory"><option>Clothing</option><option>Shoes</option><option>Bags</option><option>Accessories</option></select></div><div class="field-error" id="closetError"></div>`,`<button class="btn btn-primary" id="closetSave">${t('save')}</button>`);document.getElementById('closetFile').onchange=e=>resizeImage(e.target.files[0],x=>{photo=x;document.getElementById('closetPhotoName').textContent=x.name});document.getElementById('closetSave').onclick=()=>{const name=document.getElementById('closetName').value.trim(),cat=document.getElementById('closetCategory').value,color=document.getElementById('closetColor').value.trim();if(!name){document.getElementById('closetError').textContent=t('required');return}const img=photo?.data||fashionSVG(cat==='Shoes'?'shoe':cat==='Bags'?'bag':cat==='Accessories'?'jewelry':'dress',cat,Date.now()%5);closeSheet();addClosetItem({name,category:cat,color,image:img})}}

function handleSetting(k){if(k==='language')return openSetup('language');if(k==='appearance')return openSetup('appearance');if(k==='notifications'){state.notifications=!state.notifications;saveState();renderScreen();showToast(state.notifications?t('notificationsOn'):t('notificationsOff'));return}if(k==='currency')return openOptionsSheet({title:t('currency'),options:['USD','EUR','GBP','AED','RUB'],value:state.currency,onApply:v=>{state.currency=v;saveState();renderScreen();showToast(t('currencyUpdated'))}});if(k==='edit')return openEditProfile();if(k==='reset')return confirmReset();if(k==='sizes')return openSetup('clothingSize');if(k==='budget')return openSetup('budget');if(k==='styles')return openSetup('stylePreferences');if(k==='settings')return showToast(t('settings'))}
function bindScreen(){app.onclick=e=>{const b=e.target.closest('button,[data-upload],[data-open-look]');if(!b)return;const nav=b.dataset.nav;if(nav){navigateTo(nav);return}if(b.dataset.action)handleAction(b.dataset.action);if(b.dataset.language){setLanguage(b.dataset.language);renderLanguageList(document.getElementById('languageSearch')?.value||'')}if(b.dataset.themeChoice){setTheme(b.dataset.themeChoice)}if(b.dataset.setup)openSetup(b.dataset.setup);if(b.dataset.occasion){state.occasion=b.dataset.occasion;saveState();navigateTo('occasion')}if(b.dataset.occasionSelect){state.occasion=b.dataset.occasionSelect;saveState();renderScreen()}if(b.dataset.vibe){const v=b.dataset.vibe,i=state.vibe.indexOf(v);if(i>=0)state.vibe.splice(i,1);else if(state.vibe.length<3)state.vibe.push(v);else return showToast(`${t('chooseUpTo')} 3`);saveState();renderScreen()}if(b.dataset.budget){const v=b.dataset.budget;if(v==='Custom')openTextSheet(t('customBudget'),state.customBudget,x=>{state.customBudget=x;state.budget=`Custom: ${x}`;saveState();renderScreen()},true,'e.g. 350');else{state.budget=v;saveState();renderScreen()}}if(b.dataset.upload){document.getElementById('file-'+b.dataset.upload)?.click()}if(b.dataset.removeUpload){e.stopPropagation();state.inspiration[b.dataset.removeUpload]=null;saveState();renderScreen();showToast(t('removed'))}if(b.dataset.openLook)openLookById(b.dataset.openLook);if(b.dataset.likeLook){e.stopPropagation();toggleLike(b.dataset.likeLook)}if(b.dataset.deleteLook){e.stopPropagation();deleteLook(b.dataset.deleteLook)}if(b.dataset.replaceCategory)replaceItem(b.dataset.replaceCategory);if(b.dataset.itemStore){const item=state.currentLook?.items.find(x=>x.id===b.dataset.itemStore);window.open('https://www.google.com/search?q='+encodeURIComponent((item?.brand||'fashion')+' '+(item?.name||'')),'_blank','noopener')}if(b.dataset.guide)openGuide(b.dataset.guide);if(b.dataset.closetFilter){state.closetFilter=b.dataset.closetFilter;renderScreen()}if(b.dataset.deleteCloset){state.closetItems=state.closetItems.filter(x=>x.id!==b.dataset.deleteCloset);saveState();renderScreen();showToast(t('itemRemoved'))}if(b.dataset.setting)handleSetting(b.dataset.setting)};
const q=id=>document.getElementById(id);q('languageSearch')?.addEventListener('input',e=>renderLanguageList(e.target.value));q('occasionOther')?.addEventListener('input',e=>{state.occasionOther=e.target.value;saveState()});q('inspirationNote')?.addEventListener('input',e=>{state.inspiration.note=e.target.value;q('noteCount').textContent=e.target.value.length;saveState()});['inspiration','photo','item'].forEach(k=>q('file-'+k)?.addEventListener('change',e=>resizeImage(e.target.files[0],x=>{state.inspiration[k]=x;saveState();renderScreen();showToast(t('imageAdded'))})));q('discoverSearch')?.addEventListener('input',e=>{const s=e.target.value.toLowerCase(),c=getCatalog().filter(x=>(x.title+' '+x.description+' '+x.vibes.join(' ')).toLowerCase().includes(s));q('discoverContent').innerHTML=c.length?`${sectionRow(t('results'),'','')}<div class="closet-grid">${c.map(x=>lookCard(x)).join('')}</div>`:`<div class="empty-state"><div class="empty-icon">${icon('search',30)}</div><h2>${t('noResults')}</h2></div>`})}
function handleAction(a){if(a==='back')return goBack();if(a==='start'){state.authMode='create';return navigateTo('language')}if(a==='signin'){state.authMode='signin';return navigateTo('account')}if(a==='skip-language'||a==='language-next')return navigateTo('appearance');if(a==='appearance-next')return navigateTo('account');if(a==='toggle-auth'){state.authMode=state.authMode==='signin'?'create':'signin';return renderScreen()}if(a==='submit-account')return validateAccount();if(a==='apple'){state.name=state.name||'Eva';state.email=state.email||'apple@novera.app';saveState();showToast(t('appleConnected'));return navigateTo('setup')}if(a==='finish-setup')return finishSetup();if(a==='notifications')return showToast(state.notifications?t('noNewNotifications'):t('notificationsOff'));if(a==='occasion-skip'){state.occasion='Everyday';return navigateTo('vibe')}if(a==='occasion-next'){if(state.occasion==='Other'&&!state.occasionOther.trim())return showToast(t('tellWhere'));return navigateTo('vibe')}if(a==='vibe-next')return navigateTo('inspiration');if(a==='generate')return generateLook();if(a==='save-look')return saveLook();if(a==='replace-any')return openReplacePicker();if(a==='buy-all')return openBuyAll();if(a==='add-item')return openAddItem()}
window.addEventListener('popstate',()=>goBack());window.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});window.NOVERA_TEST={getState:()=>JSON.parse(JSON.stringify(state)),navigateTo,saveState,setTheme,setLanguage,generateLook:()=>generateLook(true),saveLook,replaceItem,addClosetItem,reset:()=>{localStorage.removeItem(KEY);state=fresh();renderScreen()},patch:o=>{Object.assign(state,o);saveState();renderScreen()}};
setTheme(state.theme,false);setLanguage(state.language,false);renderScreen();
})();
</script></body></html>
