function closet(){
 const filters=[['all','all'],['clothing','clothing'],['shoes','shoes'],['bags','bags'],['accessories','accessories']],list=st.closet.filter(x=>st.filter==='all'||x.category===st.filter);
 $('#app').innerHTML=`<section class="screen"><div class="homehead"><div><div class="eyebrow">NOVERA</div><h2>${t('wardrobe')}</h2></div><button class="iconbtn" id="addClosetTop">${I.plus}</button></div><div class="tabs">${filters.map(([k,l])=>`<button class="chip ${st.filter===k?'active':''}" data-filter="${k}">${t(l)}</button>`).join('')}</div>${list.length?`<div class="grid2">${list.map(x=>`<article class="closetitem" data-closet="${x.id}"><button class="tiny" data-del-item="${x.id}">${I.trash}</button><img src="${x.image||art(x.category,x.id.length)}" alt="${esc(x.name)}"><div class="meta"><div class="looktitle">${esc(x.name)}</div><div class="looksub">${esc(x.color)} · ${t(x.category)}</div></div></article>`).join('')}</div>`:`<div class="empty panel"><div><div class="emptyicon">${I.closet}</div><h2>${t('emptyCloset')}</h2><p class="muted" style="margin:9px 0 20px">${t('emptyClosetSub')}</p><button id="addClosetEmpty" class="primary">${t('addItem')}</button></div></div>`}<button id="addCloset" class="primary" style="margin-top:16px">${I.plus} ${t('addItem')}</button></section>${bottom('closet')}`;
 $$('[data-filter]').forEach(x=>x.onclick=()=>{st.filter=x.dataset.filter;save();closet();global()});['addClosetTop','addClosetEmpty','addCloset'].forEach(id=>{const b=$('#'+id);if(b)b.onclick=addClosetSheet});$$('[data-del-item]').forEach(x=>x.onclick=e=>{e.stopPropagation();st.closet=st.closet.filter(v=>v.id!==x.dataset.delItem);save();closet();global();toast(t('itemDeleted'))});$$('[data-closet]').forEach(x=>x.onclick=()=>{const item=st.closet.find(v=>v.id===x.dataset.closet);openSheet(item.name,`<div class="board" style="min-height:300px"><img style="min-height:300px" src="${item.image||art(item.category,1)}" alt=""></div><p class="muted" style="margin:14px 2px">${t(item.category)} · ${esc(item.color)}</p><button id="styleCloset" class="primary">${t('createLook')}</button><button id="removeCloset" class="secondary" style="margin-top:10px">${t('remove')}</button>`,m=>{$('#styleCloset',m).onclick=()=>{st.choice.notes=`Style my ${item.name}`;closeSheet();nav('occasion')};$('#removeCloset',m).onclick=()=>{st.closet=st.closet.filter(v=>v.id!==item.id);save();closeSheet();render();toast(t('itemDeleted'))}})})
}
function addClosetSheet(){
 let draft={name:'',category:'clothing',color:'',image:''};
 const body=()=>`<div id="closetPreview" class="board" style="min-height:190px;margin-bottom:12px"><img style="min-height:190px" src="${draft.image||art(draft.category,5)}" alt=""></div><input id="closetFile" hidden type="file" accept="image/*"><button id="chooseClosetPhoto" class="secondary">${I.upload} ${t('choosePhoto')}</button><div class="field"><label>${t('itemName')}</label><input id="closetName" value="${esc(draft.name)}"></div><div class="field"><label>${t('category')}</label><div class="chips" id="closetCats">${['clothing','shoes','bags','accessories'].map(c=>`<button class="chip ${draft.category===c?'active':''}" data-cc="${c}">${t(c)}</button>`).join('')}</div></div><div class="field"><label>${t('color')}</label><input id="closetColor" value="${esc(draft.color)}"></div><div class="field-error" id="closetError"></div><button id="saveCloset" class="primary">${t('saveItem')}</button>`;
 openSheet(t('addItem'),body(),m=>{const rebind=()=>{$('#chooseClosetPhoto',m).onclick=()=>$('#closetFile',m).click();$('#closetFile',m).onchange=()=>{const f=$('#closetFile',m).files[0];if(!f)return;if(f.size>2*1024*1024){$('#closetError',m).textContent='Choose an image smaller than 2 MB.';return}const r=new FileReader;r.onload=()=>{$('#closetPreview img',m).src=r.result;draft.image=r.result};r.readAsDataURL(f)};$('#closetCats',m).onclick=e=>{const x=e.target.closest('[data-cc]');if(!x)return;draft.name=$('#closetName',m).value;draft.color=$('#closetColor',m).value;draft.category=x.dataset.cc;$$('[data-cc]',m).forEach(y=>y.classList.toggle('active',y.dataset.cc===draft.category));$('#closetPreview img',m).src=draft.image||art(draft.category,5)};$('#saveCloset',m).onclick=()=>{draft.name=$('#closetName',m).value.trim();draft.color=$('#closetColor',m).value.trim();if(!draft.name||!draft.color){$('#closetError',m).textContent=t('required');return}addClosetItem({id:'item-'+Date.now(),...draft,image:draft.image||art(draft.category,Date.now()%100)})}};rebind()})
}
function addClosetItem(item){st.closet.unshift(item);save();closeSheet();render();toast(t('itemAdded'))}
function profile(){
 const p=st.profile,avatar=st.choice.uploads.photo?.data||art('profile',7),budget=p.budget==='customBudget'?(p.customBudget||t('customBudget')):t(p.budget);
 $('#app').innerHTML=`<section class="screen"><div class="homehead"><div><div class="eyebrow">NOVERA</div><h2>${t('profile')}</h2></div><button class="iconbtn" id="gear">${I.gear}</button></div><div class="profilecard panel" style="margin-top:15px"><div class="avatar"><img src="${avatar}" alt=""></div><div><h3>${esc(p.name||'Eva')}</h3><p class="muted">${esc(p.city)}, ${esc(p.country)}</p></div><button class="iconbtn" id="editP">${I.next}</button></div><div class="stats"><div class="stat panel"><strong>${st.saved.length}</strong>${t('saved')}</div><div class="stat panel"><strong>${st.closet.length}</strong>${t('items')}</div><div class="stat panel"><strong>${st.favorites.length}</strong>♥</div></div><div class="panel" style="padding:15px;margin-top:14px"><div class="eyebrow">${t('styles')}</div><div class="chips" style="margin-top:10px">${p.styles.length?p.styles.map(x=>`<span class="chip active">${t(x)}</span>`).join(''):`<span class="muted">—</span>`}</div><div class="looksub" style="margin-top:12px">${esc(p.cloth)} · ${esc(p.shoe)} · ${esc(p.height)}</div><div class="looksub">${esc(budget)}</div></div><div class="section"><h3>${t('settings')}</h3></div><div class="settings panel"><button class="settingsrow" id="setLang"><span class="ibox">${I.discover}</span><span><span class="val">${t('language')}</span><span class="lab">${esc(langName(p.language))}</span></span>${I.next}</button><button class="settingsrow" id="setTheme"><span class="ibox">✦</span><span><span class="val">${t('appearance')}</span><span class="lab">${t(p.theme)}</span></span>${I.next}</button><button class="settingsrow" id="setNotify"><span class="ibox">${I.bell}</span><span><span class="val">${t('notifications')}</span><span class="lab">${p.notifications?'On':'Off'}</span></span><span class="toggle ${p.notifications?'on':''}"><span></span></span></button><button class="settingsrow" id="setCurrency"><span class="ibox">$</span><span><span class="val">${t('currency')}</span><span class="lab">${esc(p.currency)}</span></span>${I.next}</button><button class="settingsrow" id="editProfile"><span class="ibox">${I.profile}</span><span class="val">${t('editProfile')}</span>${I.next}</button><button class="settingsrow" id="resetOnboarding"><span class="ibox">${I.refresh}</span><span class="val" style="color:var(--danger)">${t('reset')}</span>${I.next}</button></div></section>${bottom('profile')}`;
 $('#gear').onclick=()=>$('#setLang').scrollIntoView({behavior:'smooth',block:'center'});$('#editP').onclick=$('#editProfile').onclick=editProfileSheet;$('#setLang').onclick=()=>languageSheet(true);$('#setTheme').onclick=()=>themeSheet(true);$('#setNotify').onclick=()=>{p.notifications=!p.notifications;save();profile();global();toast(t('savedToast'))};$('#setCurrency').onclick=()=>optionSheet(t('currency'),['USD','EUR','GBP','AED','RUB','CNY','JPY'],p.currency,v=>{p.currency=v;save();closeSheet();render();toast(t('savedToast'))});$('#resetOnboarding').onclick=resetSheet
}
function editProfileSheet(){
 const p=st.profile;let picked=[...p.styles];openSheet(t('editProfile'),`<div class="field"><label>${t('firstName')}</label><input id="epName" value="${esc(p.name)}"></div><div class="field"><label>${t('country')}</label><input id="epCountry" value="${esc(p.country)}"></div><div class="field"><label>${t('city')}</label><input id="epCity" value="${esc(p.city)}"></div><div class="field"><label>${t('clothSize')}</label><input id="epCloth" value="${esc(p.cloth)}"></div><div class="field"><label>${t('shoeSize')}</label><input id="epShoe" value="${esc(p.shoe)}"></div><div class="field"><label>${t('height')}</label><input id="epHeight" value="${esc(p.height)}"></div><div class="field"><label>${t('styles')}</label><div class="chips">${styleOpts.map(s=>`<button class="chip ${picked.includes(s)?'active':''}" data-eps="${s}">${t(s)}</button>`).join('')}</div></div><div class="field-error" id="epError"></div><button id="epSave" class="primary">${t('save')}</button>`,m=>{$$('[data-eps]',m).forEach(x=>x.onclick=()=>{const v=x.dataset.eps;picked=picked.includes(v)?picked.filter(z=>z!==v):[...picked,v];x.classList.toggle('active')});$('#epSave',m).onclick=()=>{const name=$('#epName',m).value.trim();if(!name){$('#epError',m).textContent=t('required');return}p.name=name;p.country=$('#epCountry',m).value.trim()||p.country;p.city=$('#epCity',m).value.trim()||p.city;p.cloth=$('#epCloth',m).value.trim()||p.cloth;p.shoe=$('#epShoe',m).value.trim()||p.shoe;p.height=$('#epHeight',m).value.trim()||p.height;p.styles=picked;st.choice.city=p.city;save();closeSheet();render();toast(t('profileUpdated'))}})
}
function resetSheet(){openSheet(t('reset'),`<p class="muted" style="margin:4px 2px 18px">${t('resetConfirm')}</p><button id="resetYes" class="primary">${t('resetAll')}</button><button class="secondary" data-close style="margin-top:10px">${t('close')}</button>`,m=>{$$('[data-close]',m).forEach(x=>x.onclick=closeSheet);$('#resetYes',m).onclick=()=>{localStorage.removeItem(S);st=fresh();appState=st;closeSheet();render();scrollTo(0,0)}})}
function renderScreen(){render()}function navigateTo(s,replace=false){nav(s,replace)}function saveState(){save()}function loadState(){load()}function setLanguage(x,notify=false){setLang(x,notify)}function showToast(message){toast(message)}
loadState();renderScreen()})();
</script></body></html>
